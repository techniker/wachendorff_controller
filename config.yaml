serial:
  port: /dev/tty.wchusbserial2021340
  baudrate: 19200
  slave_address: 254
  timeout: 1.0
  serial_delay_ms: 20
  scan_start: 1
  scan_end: 254
controller:
  poll_interval: 0.1
  auto_connect: true
web:
  host: 0.0.0.0
  port: 5001
mqtt:
  enabled: false
  broker: localhost
  port: 1883
  topic_prefix: urdr
  username: ''
  password: ''
  endpoints:
  - key: process_value
    topic: urdr/process_value
    direction: publish
    enabled: true
    interval: 5.0
    qos: 0
  - key: setpoint
    topic: urdr/setpoint
    direction: publish
    enabled: true
    interval: 10.0
    qos: 0
  - key: heating_output
    topic: urdr/heating_output
    direction: publish
    enabled: true
    interval: 5.0
    qos: 0
  - key: cooling_output
    topic: urdr/cooling_output
    direction: publish
    enabled: true
    interval: 5.0
    qos: 0
  - key: controller_running
    topic: urdr/controller_running
    direction: publish
    enabled: true
    interval: 10.0
    qos: 0
  - key: error_flags
    topic: urdr/error_flags
    direction: publish
    enabled: true
    interval: 10.0
    qos: 0
  - key: setpoint_write
    topic: urdr/setpoint/set
    direction: subscribe
    enabled: false
    interval: 0
    qos: 1
  - key: controller_cmd
    topic: urdr/controller/cmd
    direction: subscribe
    enabled: false
    interval: 0
    qos: 1
auth:
  username: admin
  password_hash: $2b$12$gBjLqctm7aIjKd2dkitQreH9DXfpe4e.nl97.afZE8H5yK3fVNXmq
  session_timeout_minutes: 60
