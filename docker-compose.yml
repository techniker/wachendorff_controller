services:
  urdr-controller:
    build: .
    ports:
      - "5001:5001"
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
      - "/dev/ttyUSB1:/dev/ttyUSB1"
    group_add:
      - "20"
    volumes:
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped
    environment:
      - URDR_CONFIG_PATH=/app/config.yaml
